<!DOCTYPE html>
<html>
<head>
    <title>BIET CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BIET Davangere</h1>
        <h2>VTU CGPA Calculator</h2>
        <div id="subject-list">
            <div class="subject-row">
                <input type="number" class="credit" placeholder="Credits (e.g. 4)">
                <select class="grade">
                    <option value="10">O (10)</option>
                    <option value="9">S (9)</option>
                    <option value="8">A (8)</option>
                    <option value="7">B (7)</option>
                    <option value="0">F (0)</option>
                </select>
            </div>
        </div>
        <button onclick="calculateCGPA()">Calculate Now</button>
        <h3 id="result">Your SGPA: 0.00</h3>
        <p id="percentage">Percentage: 0%</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
